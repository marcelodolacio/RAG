<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regras do Futebol - Assistente Virtual</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <div class="search-section">
            <div class="logo">
                <span class="ball-icon">⚽</span>
                <h1>Regras do Futebol</h1>
            </div>
            <p class="tagline">Tire suas dúvidas sobre as regras do jogo</p>
            
            <form id="search-form" class="search-box">
                <div class="search-input-wrapper">
                    <svg class="search-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input type="text" id="search-input" placeholder="Como funciona o impedimento?" autocomplete="off" required>
                </div>
                <button type="submit" id="search-btn">Pesquisar</button>
            </form>
        </div>

        <div id="results-section" class="results-section hidden">
            <div class="results-header">
                <span id="results-count"></span>
            </div>
            <div id="results-content" class="results-content"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
