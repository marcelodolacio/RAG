<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA - Tensores & RAG</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>IA RAG Chatbot 🧠</h1>
            <p>Faça perguntas sobre o conteúdo dos documentos de Tensores.</p>
        </header>
        
        <main class="chat-container">
            <div id="chat-history" class="chat-history">
                <div class="message ai-message welcome">
                    <p>Olá! Eu sou o assistente Virtual. O que você gostaria de saber sobre Tensores hoje?</p>
                </div>
            </div>
            
            <div class="input-area">
                <form id="chat-form">
                    <input type="text" id="question-input" placeholder="Digite sua pergunta aqui..." autocomplete="off" required>
                    <button type="submit" id="send-btn">
                        <span>Enviar</span>
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" class="send-icon"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                    </button>
                </form>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
